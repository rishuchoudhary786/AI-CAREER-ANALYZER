<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; background: #f5f5f5; padding: 2rem; }
    .card { background: #fff; border: 1px solid #e5e5e5; border-radius: 12px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; }
    .icon-wrap { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; }
    input[type="email"] { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; height: 40px; outline: none; }
    input[type="email"]:focus { border-color: #378add; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
    .btn-primary { width: 100%; height: 40px; background: #378add; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-primary:hover { background: #185fa5; }
    .btn-secondary { background: none; border: 1px solid #ddd; border-radius: 8px; padding: 8px 20px; font-size: 13px; cursor: pointer; color: #555; }
    .error { color: #e24b4a; font-size: 12px; margin-top: 6px; display: none; }
    label { font-size: 13px; font-weight: 500; color: #555; display: block; margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <div style="text-align:center; margin-bottom:2rem;">
      <div class="icon-wrap" style="background:#e6f1fb;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#378add" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2 style="font-size:20px; font-weight:500; margin-bottom:0.4rem;">Forgot your password?</h2>
      <p style="font-size:14px; color:#666; line-height:1.6;">Enter your email and we'll send you a reset link.</p>
    </div>

    <div id="form-view">
      <div style="margin-bottom:1.25rem;">
        <label>Email address</label>
        <input type="email" id="email-input" placeholder="you@example.com" />
        <p class="error" id="error-msg">Please enter a valid email address.</p>
      </div>
      <button class="btn-primary" onclick="handleSubmit()" style="margin-bottom:1rem;">Send reset link</button>
      <p style="text-align:center; font-size:13px; color:#666;">
        Remembered it? <a href="/templates/login.html" style="color:#378add; text-decoration:none;">Back to login</a>
      </p>
    </div>

    <div id="success-view" style="display:none; text-align:center;">
      <div class="icon-wrap" style="background:#eaf3de;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#3b6d11" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      </div>
      <h3 style="font-size:17px; font-weight:500; margin-bottom:0.5rem;">Check your inbox</h3>
      <p style="font-size:14px; color:#666; line-height:1.6; margin-bottom:1.5rem;">
        We sent a reset link to <strong id="sent-email"></strong>. It expires in 15 minutes.
      </p>
      <button class="btn-secondary" onclick="resetForm()">Try a different email</button>
    </div>
  </div>

  <script>
    function handleSubmit() {
      const input = document.getElementById('email-input');
      const error = document.getElementById('error-msg');
      const email = input.value.trim();
      if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        error.style.display = 'block';
        input.style.borderColor = '#e24b4a';
        return;
      }
      document.getElementById('sent-email').textContent = email;
      document.getElementById('form-view').style.display = 'none';
      document.getElementById('success-view').style.display = 'block';
    }

    function resetForm() {
      document.getElementById('email-input').value = '';
      document.getElementById('form-view').style.display = 'block';
      document.getElementById('success-view').style.display = 'none';
    }

    document.getElementById('email-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleSubmit();
    });
  </script>
</body>
</html>
